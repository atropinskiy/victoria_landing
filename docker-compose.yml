services:
  app:
    build: ./backend
    ports:
      - "8001:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
        required: false

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: victoria_frontend
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
    volumes: []
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    profiles: [postgres]
    environment:
      POSTGRES_DB: victoria
      POSTGRES_USER: victoria
      POSTGRES_PASSWORD: victoria
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U victoria"]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
      - frontend

  portainer:
    image: portainer/portainer-ce:latest
    restart: always
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

volumes:
  postgres_data:
  portainer_data:
